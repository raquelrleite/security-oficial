spring:
  # 1. Importar primeiro
  config:
    import: "optional:file:.env[.properties]"

  # 2. DATASOURCE
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
        host: ${REDIS_HOST}
        port: ${REDIS_PORT}

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        open-in-view: false

  cache:
    type: simple

# JWT
jwt:
  secret: ${JWT_SECRET}
  expiration-hours: ${JWT_EXPIRATION_HOURS}